<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2PDF - Offline Editor</title>
    
    <!-- Load Quill.js CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Load Quill.js JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- Load html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Exact color palette from your buddy's design */
        :root {
            --bg-main: #1c1a18;       /* Outer background */
            --bg-card: #221f1d;       /* Editor background */
            --border: #312d29;        /* Subtle borders */
            --text-main: #f0ebe1;     /* Primary text */
            --text-muted: #8c8276;    /* Toolbar icons & placeholder */
            --accent-df: #a2856e;     /* "DF" logo color (used for '2PDF') */
            --btn-bg: #5a473a;        /* Brown button */
            --btn-hover: #6e5747;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .app-wrapper {
            width: 100%;
            max-width: 900px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Themed Logo */
        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            margin: 0;
        }
        .logo-white { color: #ffffff; }
        .logo-accent { color: var(--accent-df); }
        
        /* Themed Button */
        .btn {
            background-color: var(--btn-bg);
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background-color: var(--btn-hover); }
        .btn:active { transform: scale(0.98); }

        /* Themed Editor Card */
        .editor-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        #editor {
            height: 65vh;
            font-size: 16px;
            font-family: inherit;
        }

        /* --- OVERRIDING QUILL'S LIGHT THEME FOR DARK MODE --- */
        
        .ql-toolbar.ql-snow { 
            border: none !important; 
            border-bottom: 1px dashed var(--border) !important; 
            padding: 15px !important;
            border-radius: 12px 12px 0 0;
        }
        .ql-container.ql-snow { border: none !important; }
        
        .ql-editor { color: var(--text-main); padding: 25px 30px; }
        .ql-editor.ql-blank::before { color: var(--text-muted) !important; font-style: normal; }

        .ql-snow .ql-stroke { stroke: var(--text-muted) !important; }
        .ql-snow .ql-fill { fill: var(--text-muted) !important; }
        .ql-snow .ql-picker { color: var(--text-muted) !important; }
        
        .ql-snow .ql-picker:hover .ql-stroke,
        .ql-snow button:hover .ql-stroke,
        .ql-snow .ql-picker:hover .ql-fill,
        .ql-snow button:hover .ql-fill {
            stroke: var(--text-main) !important;
            fill: var(--text-main) !important;
        }

        .ql-snow .ql-picker.ql-expanded .ql-stroke,
        .ql-snow .ql-active .ql-stroke { stroke: var(--accent-df) !important; }
        .ql-snow .ql-picker.ql-expanded .ql-fill,
        .ql-snow .ql-active .ql-fill { fill: var(--accent-df) !important; }
        .ql-snow .ql-picker.ql-expanded,
        .ql-snow .ql-active { color: var(--accent-df) !important; }
        
        .ql-snow .ql-picker-options { background-color: var(--bg-card); border-color: var(--border); }

        .footer-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .shoutout {
            color: var(--accent-df);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="header">
            <!-- Updated Logo Name -->
            <h1 class="logo"><span class="logo-white">Text</span><span class="logo-accent">2PDF</span></h1>
            <button class="btn" onclick="downloadPDF()">Export PDF</button>
        </div>

        <div class="editor-container">
            <div id="editor"></div>
        </div>
        
        <div class="footer-text">
            Files are saved locally in your browser only. No backend required.<br>
            <span class="shoutout">UI inspired by MarkDF from Mikkels :P</span>
        </div>
    </div>

    <script>
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Start writing your document...',
            modules: {
                toolbar:[
                    [{ 'header':[1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],[{ 'list': 'ordered'}, { 'list': 'bullet' }],['image', 'link', 'blockquote', 'code-block'],
                    ['clean']
                ]
            }
        });

        // Changed the storage key so it doesn't conflict with anything
        const savedData = localStorage.getItem('text2pdf_localData');
        if (savedData) {
            quill.setContents(JSON.parse(savedData));
        } else {
            quill.clipboard.dangerouslyPasteHTML(`
                <h2>Offline Client-Side PDF Generation</h2>
                <p>A fast, free alternative to bulky SaaS backends.</p>
                <ul>
                    <li><strong>No Servers:</strong> Everything runs locally.</li>
                    <li><strong>No Database:</strong> Auto-saves to your browser.</li>
                    <li><strong>Perfect Exports:</strong> Images and text format flawlessly to PDF.</li>
                </ul>
                <p><br></p>
                <p><em>Drop an image here, hit export, and enjoy!</em></p>
            `);
        }

        quill.on('text-change', function() {
            localStorage.setItem('text2pdf_localData', JSON.stringify(quill.getContents()));
        });

        function downloadPDF() {
            const editorContent = quill.root.innerHTML;
            const pdfContainer = document.createElement('div');
            pdfContainer.innerHTML = editorContent;
            
            pdfContainer.style.backgroundColor = '#ffffff';
            pdfContainer.style.color = '#000000';
            pdfContainer.style.fontFamily = 'system-ui, -apple-system, sans-serif';
            pdfContainer.style.lineHeight = '1.6';
            pdfContainer.style.fontSize = '16px';
            pdfContainer.style.padding = '20px';
            
            const blockquotes = pdfContainer.getElementsByTagName('blockquote');
            for(let bq of blockquotes) {
                bq.style.borderLeft = '4px solid #ccc';
                bq.style.paddingLeft = '15px';
                bq.style.color = '#555';
            }

            const images = pdfContainer.getElementsByTagName('img');
            for(let img of images) {
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.display = 'block';
                img.style.margin = '10px 0';
            }

            const opt = {
                margin:       0.75,
                filename:     'Text2PDF-Export.pdf', // Updated filename
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' }, 
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfContainer).save();
        }
    </script>
</body>
</html>
